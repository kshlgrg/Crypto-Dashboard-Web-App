<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Live cryptocurrency dashboard with search, sort, filter, dark mode and favorites">
  <title>Crypto Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <h1>🪙 Crypto Dashboard</h1>
    <button id="darkModeToggle">🌙 Dark Mode</button>
  </div>

  <!-- Search Bar -->
  <input
    type="text"
    id="searchInput"
    placeholder="Search by name or symbol..."
  >

  <!-- Controls: Sort Dropdown + Filter Buttons -->
  <div class="controls">

    <select id="sortSelect">
      <option value="market_cap_desc">Market Cap (High → Low)</option>
      <option value="market_cap_asc">Market Cap (Low → High)</option>
      <option value="price_desc">Price (High → Low)</option>
      <option value="price_asc">Price (Low → High)</option>
      <option value="name_asc">Name (A → Z)</option>
      <option value="name_desc">Name (Z → A)</option>
    </select>

    <button id="btnAll" class="active">All</button>
    <button id="btnGainers">Gainers</button>
    <button id="btnLosers">Losers</button>

  </div>

  <!-- Loading Spinner -->
  <div id="loadingMsg">
    <div class="spinner"></div>
    <p>Fetching live data...</p>
  </div>

  <!-- Container where coin cards will appear -->
  <div id="coinsContainer"></div>

  <!-- Pagination Controls -->
  <div class="pagination" id="pagination">
    <button id="prevPage">← Prev</button>
    <span id="pageInfo">Page 1 of 1</span>
    <button id="nextPage">Next →</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
